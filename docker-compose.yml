services:
  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DB_HOST: postgres
      DB_USER: ${DB_USER:-miniapi}
      DB_PASSWORD: ${DB_PASSWORD:-miniapi}
      DB_NAME: ${DB_NAME:-miniapi}
      DB_DIALECT: postgres
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-miniapi}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-miniapi}
      POSTGRES_DB: ${DB_NAME:-miniapi}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-miniapi}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
