services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    environment:
      DOMAIN: ${DOMAIN}
      # Only substitute ${DOMAIN} — leave nginx variables ($host, $remote_addr…) untouched
      NGINX_ENVSUBST_TEMPLATE_VARS: DOMAIN
    depends_on:
      - app
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Renews the certificate every 12 hours (Let's Encrypt: 90-day validity)
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

  app:
    build: .
    expose:
      - "3000"
    environment:
      DB_HOST: postgres
      DB_USER: ${DB_USER:-miniapi}
      DB_PASSWORD: ${DB_PASSWORD:-miniapi}
      DB_NAME: ${DB_NAME:-miniapi}
      DB_DIALECT: postgres
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-miniapi}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-miniapi}
      POSTGRES_DB: ${DB_NAME:-miniapi}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-miniapi}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  certbot_certs:
  certbot_webroot:
